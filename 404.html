<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open BuyLists</title>
</head>

<body>

<h2>Open BuyLists</h2>

<button onclick="openApp()">Open in BuyLists</button>

<script>

function openApp() {

  const path = window.location.pathname;

  const listId = path.split("/").pop();

  if(listId && listId !== "index.html") {

    window.location.href = "buylists://list/" + listId;

  }

}

</script>

</body>
</html>
