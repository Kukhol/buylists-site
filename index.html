<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BuyLists</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#071c1d;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

.container{
max-width:420px;
padding:20px;
}

h1{
font-size:34px;
margin-bottom:10px;
}

.subtitle{
color:#a8b3b3;
margin-bottom:30px;
}

button{
background:#2fd0c7;
border:none;
padding:16px 32px;
font-size:18px;
border-radius:12px;
cursor:pointer;
color:black;
font-weight:bold;
}

button:active{
transform:scale(0.96);
}

.note{
margin-top:28px;
font-size:14px;
color:#8fa3a3;
}

</style>

</head>

<body>

<div class="container">

<h1>Open BuyLists</h1>

<div class="subtitle">
Tap below to open the shared grocery list.
</div>

<button onclick="openApp()">
Open in BuyLists
</button>

<div class="note">
If the app is not installed, you will be redirected to download it.
</div>

</div>

<script>

// Extract list ID from URL
var pathParts = window.location.pathname.split("/");

// Example URL
// /buylists-site/BL7611DF

var listId = pathParts[pathParts.length - 1];

// If path ends with index.html or empty
if(listId === "" || listId === "index.html"){
listId = pathParts[pathParts.length - 2];
}

function openApp(){

// Open BuyLists app
window.location.href = "buylists://list/" + listId;

// Fallback to Play Store after delay
setTimeout(function(){

window.location.href =
"https://play.google.com/store/apps/details?id=com.example.buylists";

},2000);

}

</script>

</body>
</html>
