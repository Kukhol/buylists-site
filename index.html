<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BuyLists</title>

<style>
body{
font-family: Arial;
background:#071c1d;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
margin:0;
}

.container{
max-width:400px;
}

button{
background:#2fd0c7;
border:none;
padding:16px 28px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>Open BuyLists</h1>

<p>Tap below to open the shared grocery list.</p>

<button onclick="openApp()">Open in BuyLists</button>

<p style="margin-top:30px;color:#9ca3af;">
If the app is not installed, you will be redirected to download it.
</p>

</div>

<script>

// get list id from URL
var path = window.location.pathname;
var listId = path.split("/").pop();

function openApp(){

// open the app
window.location.href = "buylists://list/" + listId;

// fallback to Play Store
setTimeout(function(){
window.location.href =
"https://play.google.com/store/apps/details?id=com.example.buylists";
},2000);

}

</script>

</body>
</html>
