<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open BuyLists</title>
</head>

<body>

<h2>Open BuyLists</h2>

<button onclick="openApp()">Open in BuyLists</button>

<script>
const path = window.location.pathname;
const listId = path.split("/").pop();

const deepLink = "buylists://list/" + listId;

window.location.href = deepLink;
</script>
</body>
</html>
