<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open BuyLists</title>

<style>
body{
font-family:sans-serif;
background:#0e1a1c;
color:white;
text-align:center;
padding-top:80px;
}

.button{
display:inline-block;
padding:16px 28px;
background:#1ed3c6;
color:black;
font-weight:bold;
border-radius:10px;
text-decoration:none;
margin-top:30px;
}
</style>

</head>

<body>

<h2>Open BuyLists</h2>

<p>Tap below to open the shared grocery list.</p>

<a id="openApp" class="button">Open in BuyLists</a>

<script>
var listId = window.location.pathname.split("/").pop();

document.getElementById("openApp").href =
"buylists://list/" + listId;

setTimeout(function(){
window.location.href =
"https://play.google.com/store/apps/details?id=com.example.buylists";
},3000);
</script>

</body>
</html>
